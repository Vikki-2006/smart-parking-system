<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Entry - Smart Parking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dark-theme">
    <div class="login-container led-box">
        <h1 class="led-text" style="color: var(--led-blue); text-shadow: 0 0 10px var(--led-blue);">SMART PARKING ENTRY
        </h1>
        <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 1.2rem;">Please scan your QR code to enter.
        </p>

        <div style="margin: 30px 0;">
            <div
                style="width: 200px; height: 200px; border: 4px dashed var(--led-blue); border-radius: 10px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
                <span style="color: var(--led-blue); font-size: 1.5rem;">SCANNER ACTIVE</span>
            </div>
        </div>

        <div class="success-msg" style="display: none; font-size: 1.5rem; margin-bottom: 30px; font-weight: bold;"
            id="successMsg">
            ACCESS GRANTED
        </div>

        <a href="/dashboard" class="led-btn sm">BACK TO TERMINAL</a>
    </div>
</body>

</html>
