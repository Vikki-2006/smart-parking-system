<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Scan - Smart Parking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dark-theme"
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center;">
    <div class="login-container led-box" style="width: 100%; max-width: 400px; padding: 40px 20px;">
        <h1 class="led-text"
            style="color: var(--led-green); text-shadow: 0 0 10px var(--led-green); margin-bottom: 20px; font-size: 2.5rem;">
            ACCESS GRANTED</h1>
        <p
            style="color: var(--led-blue); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 30px;">
            Park your vehicle.</p>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = "{{ maps_url|safe }}";
        }, 3000);
    </script>
</body>

</html>
